services:

  db:
    image: postgres:15
    container_name: securewatch_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: securewatch

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: ./backend
    container_name: securewatch_backend
    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - db


  frontend:
    build: ./frontend
    container_name: securewatch_frontend
    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend


volumes:
  postgres_data: